<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Лумория</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #53565A;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: 50%;
      left: 50%;
      width: 700px;
      height: 700px;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, rgba(141, 110, 151, 0.07) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: fadeIn 1.8s ease-out;
    }

    .logo {
      max-width: 420px;
      width: 90vw;
      height: auto;
      filter: drop-shadow(0 0 50px rgba(141, 110, 151, 0.08));
      transition: filter 0.6s ease;
    }

    .logo:hover {
      filter: drop-shadow(0 0 70px rgba(141, 110, 151, 0.18));
    }

    @keyframes fadeIn {
      0% {
        opacity: 0;
        transform: translateY(10px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 480px) {
      .logo {
        max-width: 280px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="lumoria_logo.png" alt="Лумория" class="logo">
  </div>
</body>
</html>
