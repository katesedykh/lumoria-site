<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Лумория</title>
  <meta name="description" content="Лумория — скоро открытие">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #53565A;
      overflow: hidden;
      position: relative;
    }

    /* soft noise grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      background-size: 256px 256px;
      pointer-events: none;
      z-index: 1;
    }

    /* radial glow */
    body::after {
      content: '';
      position: fixed;
      top: 50%;
      left: 50%;
      width: 800px;
      height: 800px;
      transform: translate(-50%, -50%);
      background: radial-gradient(
        ellipse at center,
        rgba(141, 110, 151, 0.08) 0%,
        rgba(141, 110, 151, 0.03) 40%,
        transparent 70%
      );
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3rem;
    }

    .logo-wrap {
      opacity: 0;
      transform: translateY(16px);
      animation: rise 1.6s cubic-bezier(0.22, 1, 0.36, 1) 0.2s forwards;
    }

    .logo {
      width: min(480px, 85vw);
      height: auto;
      filter: drop-shadow(0 0 80px rgba(141, 110, 151, 0.06));
      transition: filter 0.8s ease;
    }

    .logo:hover {
      filter: drop-shadow(0 0 100px rgba(141, 110, 151, 0.16));
    }

    .bottom {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.4rem;
      opacity: 0;
      transform: translateY(12px);
      animation: rise 1.4s cubic-bezier(0.22, 1, 0.36, 1) 0.8s forwards;
    }

    .divider {
      width: 32px;
      height: 1px;
      background: rgba(141, 110, 151, 0.25);
    }

    .tagline {
      font-family: -apple-system, 'Segoe UI', 'Helvetica Neue', sans-serif;
      font-size: 0.7rem;
      font-weight: 400;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: rgba(141, 110, 151, 0.5);
    }

    @keyframes rise {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 480px) {
      .logo { width: 75vw; }
      .tagline { font-size: 0.6rem; letter-spacing: 0.3em; }
      .bottom { gap: 1rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo-wrap">
      <img src="lumoria_logo.svg" alt="Лумория" class="logo">
    </div>
    <div class="bottom">
      <div class="divider"></div>
      <p class="tagline">Скоро открытие</p>
    </div>
  </div>
</body>
</html>
